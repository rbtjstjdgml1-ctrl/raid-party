<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>레이드 파티 신청</title>

<style>
body { font-family: sans-serif; background:#111; color:#fff; padding:20px; }
.box { background:#222; padding:15px; border-radius:10px; margin-bottom:15px; }
button { padding:10px; border:none; background:#4CAF50; color:#fff; border-radius:6px; }
select, input { padding:8px; margin:5px 0; width:100%; }
.member { padding:5px; border-bottom:1px solid #444; }
</style>
</head>

<body>

<h2>레이드 파티 신청</h2>

<div class="box">
  <input id="name" placeholder="이름">

  <select id="job">
    <option value="수호">수호</option>
    <option value="치유성">치유성</option>
    <option value="궁성">궁성</option>
    <option value="살성">살성</option>
  </select>

  <select id="party">
    <option value="party1">1파티</option>
    <option value="party2">2파티</option>
  </select>

  <button onclick="addMember()">신청하기</button>
</div>

<div class="box">
  <h3>파티 목록</h3>
  <div id="list"></div>
</div>

<!-- 🔥 디버그 -->
<div id="debugBox" style="position:fixed;left:10px;right:10px;bottom:10px;background:#000;color:#0f0;padding:10px;font-size:12px;max-height:200px;overflow:auto;">
debug...
</div>

<!-- 🔥 Firebase (중요: compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const debugBox = document.getElementById("debugBox");
function debug(msg){
  console.log(msg);
  debugBox.textContent += "\n" + msg;
}

window.onerror = (m)=>debug("ERROR: "+m);
window.onunhandledrejection = ()=>debug("PROMISE ERROR");

debug("스크립트 시작");


// 🔥 너 Firebase 설정 (완료)
const firebaseConfig = {
  apiKey: "AIzaSyBfOXxM4tT6UBvqVSJv64zwX3qsfsMVuvw",
  authDomain: "raid-party-shared.firebaseapp.com",
  databaseURL: "https://raid-party-shared-default-rtdb.firebaseio.com",
  projectId: "raid-party-shared",
  storageBucket: "raid-party-shared.firebasestorage.app",
  messagingSenderId: "661883999004",
  appId: "1:661883999004:web:e783a090e54e6ae4a760d9",
  measurementId: "G-Q5RTBBG0PJ"
};

let db;

try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  debug("firebase 연결 성공");
}catch(e){
  debug("firebase 실패: "+e.message);
}


// 🔥 신청 기능
function addMember(){
  debug("신청 버튼 클릭");

  const name = document.getElementById("name").value;
  const job = document.getElementById("job").value;
  const party = document.getElementById("party").value;

  if(!name){
    alert("이름 입력");
    return;
  }

  db.ref("parties/"+party).push({
    name:name,
    job:job
  });

  debug("저장 완료");
}


// 🔥 실시간 불러오기
function load(){
  db.ref("parties").on("value", snapshot=>{
    const data = snapshot.val() || {};
    const list = document.getElementById("list");

    list.innerHTML = "";

    ["party1","party2"].forEach(p=>{
      list.innerHTML += `<h4>${p}</h4>`;

      if(data[p]){
        Object.values(data[p]).forEach(m=>{
          list.innerHTML += `<div class="member">${m.name} (${m.job})</div>`;
        });
      } else {
        list.innerHTML += `<div>없음</div>`;
      }
    });

    debug("데이터 불러옴");
  });
}

load();
</script>

</body>
</html>
