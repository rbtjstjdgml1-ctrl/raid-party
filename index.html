<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이온2 레이드</title>

<style>
body { background:#0a0f18; color:#fff; font-family:Arial; padding:20px; }
.box { background:#1a2233; padding:15px; border-radius:12px; margin-bottom:15px; }
button { padding:10px; border:none; border-radius:8px; background:#6d28d9; color:#fff; cursor:pointer; }
select { padding:10px; border-radius:8px; width:100%; margin-bottom:6px; }
.raid { background:#111827; padding:12px; margin-bottom:10px; border-radius:10px; }
.title { font-weight:bold; cursor:pointer; }
.member { font-size:14px; margin:2px 0; }
.inline { display:flex; gap:6px; }
</style>
</head>

<body>

<h2>아이온2 레이드</h2>

<div class="box">
  <input id="adminPw" placeholder="관리자 비밀번호">
  <button onclick="loginAdmin()">관리자 로그인</button>
</div>

<div id="raidList"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSy...",
 databaseURL: "https://raid-party-shared-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let raids = {};
let isAdmin = false;
let myName = localStorage.getItem("name") || prompt("닉네임 입력");

localStorage.setItem("name", myName);

function loginAdmin(){
 if(document.getElementById("adminPw").value==="1234"){
  isAdmin=true;
  alert("관리자됨");
 }
}

function getMembers(raid, party){
 return raid[party] ? Object.entries(raid[party]).map(([k,v])=>({key:k,...v})) : [];
}

function render(){
 let html = "";

 Object.entries(raids).forEach(([id, r])=>{
  const p1 = getMembers(r,"party1");
  const p2 = getMembers(r,"party2");

  html += `
  <div class="raid">
   <div class="title">${r.name} (${p1.length+p2.length}/8)</div>

   <div>
    <h4>1파티</h4>

    <select id="job1-${id}" onchange="roleUI('${id}',1)">
     <option value="">직업</option>
     <option>수호</option><option>치유성</option><option>궁성</option>
     <option>살성</option><option>검성</option><option>마도성</option>
     <option>정령성</option><option>호법성</option>
    </select>

    <select id="role1-${id}" style="display:none;"></select>

    <button onclick="join('${id}','party1',1)">신청</button>

    ${p1.map(m=>`
     <div class="member">
      ${m.name} (${m.job})
      ${m.name===myName ? `<button onclick="cancel('${id}','party1','${m.key}')">취소</button>` : ""}
      ${isAdmin ? `<button onclick="del('${id}','party1','${m.key}')">삭제</button>` : ""}
     </div>
    `).join("")}
   </div>

   <div>
    <h4>2파티</h4>

    <select id="job2-${id}" onchange="roleUI('${id}',2)">
     <option value="">직업</option>
     <option>수호</option><option>치유성</option><option>궁성</option>
     <option>살성</option><option>검성</option><option>마도성</option>
     <option>정령성</option><option>호법성</option>
    </select>

    <select id="role2-${id}" style="display:none;"></select>

    <button onclick="join('${id}','party2',2)">신청</button>

    ${p2.map(m=>`
     <div class="member">
      ${m.name} (${m.job})
      ${m.name===myName ? `<button onclick="cancel('${id}','party2','${m.key}')">취소</button>` : ""}
      ${isAdmin ? `<button onclick="del('${id}','party2','${m.key}')">삭제</button>` : ""}
     </div>
    `).join("")}
   </div>
  </div>
  `;
 });

 document.getElementById("raidList").innerHTML = html;
}

function roleUI(id,num){
 const job = document.getElementById(`job${num}-${id}`).value;
 const role = document.getElementById(`role${num}-${id}`);

 if(job==="검성"){
  role.style.display="block";
  role.innerHTML=`<option value="tank">탱</option><option value="dps">딜</option>`;
 }
 else if(job==="호법성"){
  role.style.display="block";
  role.innerHTML=`<option value="heal">힐</option><option value="dps">딜</option>`;
 }
 else{
  role.style.display="none";
 }
}

function join(id,party,num){
 const job = document.getElementById(`job${num}-${id}`).value;
 const roleEl = document.getElementById(`role${num}-${id}`);

 let role="dps";

 if(!job) return alert("직업 선택");

 if(job==="수호") role="tank";
 if(job==="치유성") role="heal";

 if(job==="검성"||job==="호법성"){
  role=roleEl.value;
  if(!role) return alert("역할 선택");
 }

 db.ref("raids/"+id+"/"+party).push({
  name: myName,
  job,
  role
 });
}

function cancel(id,party,key){
 db.ref("raids/"+id+"/"+party+"/"+key).remove();
}

function del(id,party,key){
 if(!isAdmin) return;
 db.ref("raids/"+id+"/"+party+"/"+key).remove();
}

db.ref("raids").on("value", s=>{
 raids=s.val()||{};
 render();
});
</script>

</body>
</html>
